<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dansk Flashcards</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #f5f0e8;
      --warm-brown: #5a4a3a;
      --light-brown: #b09070;
      --card-bg: #fff8ee;
      --card-border: #e0d0b8;
      --correct: #3a7d5a;
      --correct-bg: #eaf5ef;
      --correct-border: #a8d4b8;
      --wrong: #b84040;
      --wrong-bg: #faeaea;
      --wrong-border: #e0a0a0;
      --neutral-hover: #ede4d4;
      --reading-accent: #7a5a3a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background-color: var(--cream);
      background-image:
        radial-gradient(circle at 15% 15%, #e8d5b0 0%, transparent 45%),
        radial-gradient(circle at 85% 85%, #c9dde8 0%, transparent 45%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2.5rem 1rem 3rem;
      font-family: 'Source Sans 3', sans-serif;
      gap: 1.6rem;
    }

    header {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 400;
      color: var(--warm-brown);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .score-bar {
      display: flex;
      gap: 1.4rem;
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      color: #9a8a7a;
    }

    .score-bar span { display: flex; align-items: center; gap: 0.3rem; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot-correct { background: var(--correct); }
    .dot-wrong   { background: var(--wrong); }

    .progress-wrap {
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      transition: width 0.4s ease;
    }
    .progress-wrap.wide { width: 460px; }

    .progress-label {
      font-size: 0.72rem;
      color: #9a8a7a;
      letter-spacing: 0.08em;
      text-align: right;
    }

    .progress-track {
      width: 100%;
      height: 4px;
      background: #ddd5c5;
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--warm-brown);
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    /* ── Standard card ── */
    .card {
      width: 340px;
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: 16px;
      padding: 2rem 2rem 1.6rem;
      box-shadow: 0 8px 32px rgba(90,74,58,0.12), 0 2px 8px rgba(90,74,58,0.07);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      animation: cardIn 0.35s ease;
      transition: width 0.3s ease;
    }

    /* ── Reading card — wider, left-aligned passage ── */
    .card.reading-card {
      width: 460px;
      align-items: flex-start;
      padding: 1.8rem 2rem 1.6rem;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-type-badge {
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 600;
      padding: 0.22rem 0.65rem;
      border-radius: 20px;
      margin-bottom: 0.2rem;
      align-self: center;
    }
    .badge-translate  { background: #e8ddd0; color: #7a6a5a; }
    .badge-letter     { background: #dde8e0; color: #3a6a50; }
    .badge-sentence   { background: #dde0ee; color: #3a4a7a; }
    .badge-reading    { background: #ede0cc; color: #7a5a2a; }

    .card-label {
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--light-brown);
      align-self: center;
    }

    /* passage text block */
    .reading-passage {
      width: 100%;
      background: #f0e8d8;
      border-left: 3px solid var(--light-brown);
      border-radius: 0 8px 8px 0;
      padding: 0.9rem 1rem;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      line-height: 1.75;
      color: #3a2e22;
      margin: 0.4rem 0 0.8rem;
    }

    /* question text */
    .reading-question {
      width: 100%;
      font-size: 0.9rem;
      font-weight: 600;
      color: #4a3a2a;
      line-height: 1.5;
      padding: 0 0.1rem;
    }

    .card-word {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      color: #3a2e22;
      line-height: 1.2;
      text-align: center;
    }
    .card-word.single   { font-size: 3rem; }
    .card-word.phrase   { font-size: 2rem; }
    .card-word.sentence { font-size: 1.2rem; font-weight: 400; font-style: italic; line-height: 1.6; }

    .blank-underline {
      display: inline-block;
      min-width: 2rem;
      border-bottom: 2.5px solid var(--warm-brown);
      margin: 0 0.1em;
      vertical-align: baseline;
    }

    .card-hint {
      font-size: 0.75rem;
      color: #b0a090;
      font-style: italic;
      margin-top: 0.1rem;
      text-align: center;
      align-self: center;
    }

    /* choices — wider when reading card */
    .choices {
      width: 340px;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      transition: width 0.3s ease;
    }
    .choices.wide { width: 460px; }

    .choice-btn {
      width: 100%;
      padding: 0.75rem 1.1rem;
      border: 1.5px solid var(--card-border);
      border-radius: 10px;
      background: var(--card-bg);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.92rem;
      color: #3a2e22;
      cursor: pointer;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.7rem;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      animation: fadeUp 0.3s ease both;
      line-height: 1.4;
    }

    .choice-btn:nth-child(1) { animation-delay: 0.05s; }
    .choice-btn:nth-child(2) { animation-delay: 0.10s; }
    .choice-btn:nth-child(3) { animation-delay: 0.15s; }
    .choice-btn:nth-child(4) { animation-delay: 0.20s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .choice-btn:not(:disabled):hover {
      background: var(--neutral-hover);
      border-color: #c8b89a;
      transform: translateX(3px);
    }

    .choice-letter {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--light-brown);
      min-width: 1rem;
      flex-shrink: 0;
    }

    .choice-btn.correct {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      color: var(--correct);
      font-weight: 600;
    }
    .choice-btn.correct .choice-letter { color: var(--correct); }

    .choice-btn.wrong {
      background: var(--wrong-bg);
      border-color: var(--wrong-border);
      color: var(--wrong);
    }
    .choice-btn.wrong .choice-letter { color: var(--wrong); }
    .choice-btn:disabled { cursor: default; transform: none; }

    .result-msg {
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      min-height: 1.2rem;
      color: transparent;
      transition: color 0.2s;
    }
    .result-msg.show-correct { color: var(--correct); }
    .result-msg.show-wrong   { color: var(--wrong); }

    .next-btn {
      width: 340px;
      padding: 0.85rem;
      border: none;
      border-radius: 10px;
      background: var(--warm-brown);
      color: #f5f0e8;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s, width 0.3s ease;
      opacity: 0;
      pointer-events: none;
    }
    .next-btn.wide { width: 460px; }
    .next-btn.visible { opacity: 1; pointer-events: all; }
    .next-btn:hover { background: #3a2e22; }

    /* Summary */
    .summary {
      width: 340px;
      background: var(--card-bg);
      border: 1.5px solid var(--card-border);
      border-radius: 16px;
      padding: 2.5rem 2rem;
      box-shadow: 0 8px 32px rgba(90,74,58,0.12);
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      text-align: center;
      animation: cardIn 0.4s ease;
    }
    .summary.show { display: flex; }

    .summary h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      color: #3a2e22;
    }

    .big-score {
      font-family: 'Playfair Display', serif;
      font-size: 4rem;
      font-weight: 700;
      color: var(--warm-brown);
      line-height: 1;
    }

    .summary .sub { font-size: 0.82rem; color: #9a8a7a; letter-spacing: 0.06em; }
    .summary-stats { display: flex; gap: 2rem; }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
    .stat .num { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-weight: 700; }
    .stat .lbl { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: #9a8a7a; }
    .stat.c .num { color: var(--correct); }
    .stat.w .num { color: var(--wrong); }

    .restart-btn {
      padding: 0.75rem 2rem;
      border: 1.5px solid var(--warm-brown);
      border-radius: 10px;
      background: transparent;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--warm-brown);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .restart-btn:hover { background: var(--warm-brown); color: #f5f0e8; }

    .game-area { display: flex; flex-direction: column; align-items: center; gap: 1.6rem; }
  </style>
</head>
<body>

<header>
  <h1>Dansk · Flashcards</h1>
  <div class="score-bar">
    <span><i class="dot dot-correct"></i> <span id="sc-correct">0</span> correct</span>
    <span><i class="dot dot-wrong"></i> <span id="sc-wrong">0</span> wrong</span>
  </div>
</header>

<div class="progress-wrap" id="progress-wrap">
  <div class="progress-label" id="prog-label">1 / 50</div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:2%"></div></div>
</div>

<div class="game-area" id="game-area">
  <div class="card" id="card">
    <span class="card-type-badge" id="card-badge"></span>
    <span class="card-label" id="card-label"></span>
    <span class="card-word" id="card-word"></span>
    <span class="card-hint" id="card-hint"></span>
  </div>

  <div class="choices" id="choices"></div>
  <div class="result-msg" id="result-msg"></div>
  <button class="next-btn" id="next-btn" onclick="nextCard()">Next card →</button>
</div>

<div class="summary" id="summary">
  <h2>Session complete</h2>
  <div class="big-score" id="pct">0%</div>
  <div class="sub">of answers correct</div>
  <div class="summary-stats">
    <div class="stat c"><div class="num" id="sum-correct">0</div><div class="lbl">Correct</div></div>
    <div class="stat w"><div class="num" id="sum-wrong">0</div><div class="lbl">Wrong</div></div>
  </div>
  <button class="restart-btn" onclick="restart()">Try again</button>
</div>

<script>
  // ── Word bank ──────────────────────────────────────────────────────────────
  const allWords = [
    { danish: "Hund",       english: "Dog" },
    { danish: "Kat",        english: "Cat" },
    { danish: "Hus",        english: "House" },
    { danish: "Vand",       english: "Water" },
    { danish: "Brød",       english: "Bread" },
    { danish: "Bog",        english: "Book" },
    { danish: "Bil",        english: "Car" },
    { danish: "Barn",       english: "Child" },
    { danish: "Mand",       english: "Man" },
    { danish: "Kvinde",     english: "Woman" },
    { danish: "Dag",        english: "Day" },
    { danish: "Nat",        english: "Night" },
    { danish: "Sol",        english: "Sun" },
    { danish: "Måne",       english: "Moon" },
    { danish: "Skov",       english: "Forest" },
    { danish: "Hav",        english: "Sea" },
    { danish: "Tid",        english: "Time" },
    { danish: "År",         english: "Year" },
    { danish: "Stor",       english: "Big" },
    { danish: "Lille",      english: "Small" },
    { danish: "Mad",        english: "Food" },
    { danish: "Fugl",       english: "Bird" },
    { danish: "Fisk",       english: "Fish" },
    { danish: "Skole",      english: "School" },
    { danish: "Vej",        english: "Road" },
    { danish: "Navn",       english: "Name" },
    { danish: "Kold",       english: "Cold" },
    { danish: "Varm",       english: "Warm" },
    { danish: "Hurtig",     english: "Fast" },
    { danish: "Gammel",     english: "Old" },
    { danish: "Mere vand",  english: "More water" },
    { danish: "Stort hus",  english: "Big house" },
    { danish: "Lille barn", english: "Small child" },
    { danish: "God dag",    english: "Good day" },
    { danish: "God nat",    english: "Good night" },
    { danish: "Frisk brød", english: "Fresh bread" },
    { danish: "Sort kat",   english: "Black cat" },
    { danish: "Hurtig bil", english: "Fast car" },
    { danish: "Gammel bog", english: "Old book" },
    { danish: "Varm mad",   english: "Warm food" },
  ];

  // ── Fill-the-blank sentence bank ───────────────────────────────────────────
  const sentences = [
    { template: "___ løber hurtigt.",        blank: "Hunden",  distractors: ["Bogen",   "Vandet",  "Skolen"],  hint: "The ___ runs fast." },
    { template: "Jeg læser en ___.",          blank: "bog",     distractors: ["bil",     "sol",     "fugl"],    hint: "I am reading a ___." },
    { template: "Kan jeg få mere ___?",       blank: "vand",    distractors: ["brød",    "dag",     "navn"],    hint: "Can I have more ___?" },
    { template: "Barnet leger i ___.",        blank: "skoven",  distractors: ["manden",  "bilen",   "natten"],  hint: "The child plays in the ___." },
    { template: "Vi ser på ___ i nat.",       blank: "månen",   distractors: ["huset",   "brødet",  "vejen"],   hint: "We are looking at the ___ tonight." },
    { template: "Katten sover på ___.",       blank: "huset",   distractors: ["havet",   "fuglen",  "bogen"],   hint: "The cat sleeps on the ___." },
    { template: "Det er en ___ dag i dag.",   blank: "god",     distractors: ["lille",   "kold",    "gammel"],  hint: "It is a ___ day today." },
    { template: "Fuglen synger om ___.",      blank: "natten",  distractors: ["skolen",  "manden",  "vejen"],   hint: "The bird sings about the ___." },
    { template: "Hun spiser varmt ___.",      blank: "brød",    distractors: ["vand",    "år",      "navn"],    hint: "She eats warm ___." },
    { template: "Manden kører en ___ bil.",   blank: "hurtig",  distractors: ["gammel",  "stor",    "kold"],    hint: "The man drives a ___ car." },
    { template: "Vi bor i et stort ___.",     blank: "hus",     distractors: ["hav",     "fugl",    "skov"],    hint: "We live in a big ___." },
    { template: "___ skinner i dag.",         blank: "Solen",   distractors: ["Hunden",  "Bogen",   "Bilen"],   hint: "The ___ is shining today." },
  ];

  // ── Reading comprehension bank ─────────────────────────────────────────────
  // passage: 2-3 simple Danish sentences shown to the player
  // question: asked in English
  // answer: correct English answer
  // distractors: 3 wrong English answers
  const readings = [
    {
      passage: "Lars har en hund. Hunden hedder Max. Max er stor og brun.",
      question: "What colour is Max?",
      answer: "Brown",
      distractors: ["Black", "White", "Grey"],
    },
    {
      passage: "Anna drikker vand. Vandet er koldt. Hun er glad.",
      question: "How does Anna feel?",
      answer: "Happy",
      distractors: ["Sad", "Tired", "Hungry"],
    },
    {
      passage: "Det er dag. Solen skinner. Børnene leger i skoven.",
      question: "Where are the children playing?",
      answer: "In the forest",
      distractors: ["At school", "In the house", "By the sea"],
    },
    {
      passage: "Manden læser en bog. Bogen er gammel. Han sidder i huset.",
      question: "What is the man doing?",
      answer: "Reading a book",
      distractors: ["Eating food", "Driving a car", "Walking the dog"],
    },
    {
      passage: "Katten sidder på bilen. Bilen er hurtig og rød. Katten er lille.",
      question: "What colour is the car?",
      answer: "Red",
      distractors: ["Blue", "Brown", "Black"],
    },
    {
      passage: "Det er nat. Månen lyser. En fugl synger i skoven.",
      question: "What is happening in the forest at night?",
      answer: "A bird is singing",
      distractors: ["A dog is running", "Children are playing", "A man is reading"],
    },
    {
      passage: "Maria spiser brød og drikker vand. Brødet er friskt og varmt.",
      question: "What is Maria drinking?",
      answer: "Water",
      distractors: ["Milk", "Tea", "Juice"],
    },
    {
      passage: "Drengen går til skole. Skolen er stor. Han har en gammel bog.",
      question: "What does the boy have with him?",
      answer: "An old book",
      distractors: ["A new car", "A small dog", "Fresh bread"],
    },
    {
      passage: "Familien bor ved havet. Havet er blåt og koldt. De ser på månen.",
      question: "What are they looking at?",
      answer: "The moon",
      distractors: ["The sun", "The forest", "The road"],
    },
    {
      passage: "En kvinde og et barn går på vejen. Det er en varm dag. De er glade.",
      question: "What kind of day is it?",
      answer: "A warm day",
      distractors: ["A cold day", "A dark night", "A rainy day"],
    },
  ];

  // ── Letter pools ───────────────────────────────────────────────────────────
  const VOWELS     = ["a","e","i","o","u","y","æ","ø","å"];
  const CONSONANTS = ["b","c","d","f","g","h","j","k","l","m","n","p","r","s","t","v"];
  const ALL_ALPHA  = [...VOWELS, ...CONSONANTS];
  const LETTERS    = ["A","B","C","D"];

  let deck = [], current = 0, correct = 0, wrong = 0, answered = false;
  let seenAnswers = new Set();

  // ── Utils ──────────────────────────────────────────────────────────────────
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ── Build deck ─────────────────────────────────────────────────────────────
  // 40 word cards (translate / letter / sentence) + 10 reading cards
  // Reading cards are spread evenly through the deck (every ~5 cards)
  function buildDeck() {
    const shuffledWords = shuffle(allWords);
    const shuffledSents = shuffle(sentences);
    const shuffledRead  = shuffle(readings);
    let sIdx = 0;

    const wordCards = shuffledWords.map(word => {
      const roll = Math.random();
      if (roll < 0.25) {
        const sent = shuffledSents[sIdx % shuffledSents.length];
        sIdx++;
        return { type: "sentence", word, sent };
      }
      if (roll < 0.55 && !word.danish.includes(" ") && word.danish.length >= 3) {
        return { type: "letter", word };
      }
      return { type: "translate", word };
    });

    // Interleave reading cards every ~4 word cards
    const full = [];
    let rIdx = 0;
    wordCards.forEach((card, i) => {
      full.push(card);
      if ((i + 1) % 4 === 0 && rIdx < shuffledRead.length) {
        full.push({ type: "reading", reading: shuffledRead[rIdx++] });
      }
    });

    return full;
  }

  // ── Missing-letter logic ───────────────────────────────────────────────────
  function buildLetterCard(word) {
    const chars = [...word.danish];
    const lower = chars.map(c => c.toLowerCase());

    const roll = Math.random();
    let pool;
    if (roll < 0.33)      pool = VOWELS;
    else if (roll < 0.66) pool = CONSONANTS;
    else                  pool = ALL_ALPHA;

    const eligibleIdx = lower.map((c, i) => pool.includes(c) ? i : -1).filter(i => i >= 0);
    const useIdx = eligibleIdx.length
      ? eligibleIdx
      : lower.map((c, i) => ALL_ALPHA.includes(c) ? i : -1).filter(i => i >= 0);

    const hideIdx = useIdx[Math.floor(Math.random() * useIdx.length)];
    const hiddenChar = lower[hideIdx];

    const distPool = (eligibleIdx.length ? pool : ALL_ALPHA).filter(c => c !== hiddenChar);
    const wrongLetters = shuffle(distPool).slice(0, 3);
    const choices = shuffle([hiddenChar, ...wrongLetters]);
    const displayParts = chars.map((c, i) => i === hideIdx ? null : c);

    return { hiddenChar, displayParts, choices };
  }

  // ── Set wide layout ────────────────────────────────────────────────────────
  function setWide(wide) {
    const cardEl    = document.getElementById("card");
    const choicesEl = document.getElementById("choices");
    const nextBtn   = document.getElementById("next-btn");
    const progWrap  = document.getElementById("progress-wrap");

    if (wide) {
      cardEl.classList.add("reading-card");
      choicesEl.classList.add("wide");
      nextBtn.classList.add("wide");
      progWrap.classList.add("wide");
    } else {
      cardEl.classList.remove("reading-card");
      choicesEl.classList.remove("wide");
      nextBtn.classList.remove("wide");
      progWrap.classList.remove("wide");
    }
  }

  // ── Render current card ────────────────────────────────────────────────────
  function renderCard() {
    answered = false;
    const entry = deck[current];

    const cardEl    = document.getElementById("card");
    const badgeEl   = document.getElementById("card-badge");
    const labelEl   = document.getElementById("card-label");
    const wordEl    = document.getElementById("card-word");
    const hintEl    = document.getElementById("card-hint");
    const choicesEl = document.getElementById("choices");
    const msgEl     = document.getElementById("result-msg");

    // Animate
    cardEl.style.animation = "none";
    void cardEl.offsetWidth;
    cardEl.style.animation = "";

    // Progress
    const pct = Math.max(2, Math.round((current / deck.length) * 100));
    document.getElementById("prog-fill").style.width = pct + "%";
    document.getElementById("prog-label").textContent = `${current + 1} / ${deck.length}`;

    msgEl.textContent = "";
    msgEl.className = "result-msg";
    document.getElementById("next-btn").className = "next-btn";
    choicesEl.innerHTML = "";

    // Clear any previous reading-specific elements
    const oldPassage  = cardEl.querySelector(".reading-passage");
    const oldQuestion = cardEl.querySelector(".reading-question");
    if (oldPassage)  oldPassage.remove();
    if (oldQuestion) oldQuestion.remove();
    wordEl.style.display = "";
    hintEl.style.display = "";

    // ── TRANSLATE ──────────────────────────────────────────────────────────
    if (entry.type === "translate") {
      setWide(false);
      const word = entry.word;
      badgeEl.textContent = "Translate";
      badgeEl.className = "card-type-badge badge-translate";
      labelEl.textContent = "Danish → English";
      wordEl.className = "card-word " + (word.danish.includes(" ") ? "phrase" : "single");
      wordEl.innerHTML = word.danish;
      hintEl.textContent = "";

      const pool = allWords.filter(w => w.english !== word.english && !seenAnswers.has(w.english)).map(w => w.english);
      const fallback = allWords.filter(w => w.english !== word.english).map(w => w.english);
      const src = pool.length >= 3 ? pool : fallback;
      const choices = shuffle([word.english, ...shuffle(src).slice(0, 3)]);
      renderChoices(choicesEl, choices, word.english, () => seenAnswers.add(word.english));
    }

    // ── MISSING LETTER ─────────────────────────────────────────────────────
    else if (entry.type === "letter") {
      setWide(false);
      const word = entry.word;
      const { hiddenChar, displayParts, choices } = buildLetterCard(word);

      badgeEl.textContent = "Missing Letter";
      badgeEl.className = "card-type-badge badge-letter";
      labelEl.textContent = "Which letter is missing?";
      wordEl.className = "card-word single";
      wordEl.innerHTML = displayParts.map(c =>
        c === null ? `<span class="blank-underline">&nbsp;</span>` : c
      ).join("");
      hintEl.textContent = `"${word.english}" in Danish`;

      renderChoices(choicesEl, choices, hiddenChar, null);
    }

    // ── SENTENCE FILL ──────────────────────────────────────────────────────
    else if (entry.type === "sentence") {
      setWide(false);
      const { sent } = entry;

      badgeEl.textContent = "Fill the Blank";
      badgeEl.className = "card-type-badge badge-sentence";
      labelEl.textContent = "Choose the missing word";
      wordEl.className = "card-word sentence";

      const parts = sent.template.split("___");
      wordEl.innerHTML = parts[0] + `<span class="blank-underline">&nbsp;&nbsp;&nbsp;</span>` + (parts[1] || "");
      hintEl.textContent = sent.hint;

      const choices = shuffle([sent.blank, ...sent.distractors]);
      renderChoices(choicesEl, choices, sent.blank, null);
    }

    // ── READING COMPREHENSION ──────────────────────────────────────────────
    else if (entry.type === "reading") {
      setWide(true);
      const { reading } = entry;

      badgeEl.textContent = "Read & Understand";
      badgeEl.className = "card-type-badge badge-reading";
      labelEl.textContent = "Read the passage, then answer";

      // Hide the generic word/hint elements — we build custom elements
      wordEl.style.display = "none";
      hintEl.style.display = "none";

      // Passage block
      const passageEl = document.createElement("div");
      passageEl.className = "reading-passage";
      // Split sentences onto separate lines for readability
      passageEl.innerHTML = reading.passage
        .split(". ")
        .map((s, i, arr) => i < arr.length - 1 ? s + "." : s)
        .join("<br>");
      cardEl.appendChild(passageEl);

      // Question
      const questionEl = document.createElement("div");
      questionEl.className = "reading-question";
      questionEl.textContent = reading.question;
      cardEl.appendChild(questionEl);

      const choices = shuffle([reading.answer, ...reading.distractors]);
      renderChoices(choicesEl, choices, reading.answer, null);
    }
  }

  // ── Render choice buttons ──────────────────────────────────────────────────
  function renderChoices(container, choices, correctAnswer, onReveal) {
    choices.forEach((choice, i) => {
      const btn = document.createElement("button");
      btn.className = "choice-btn";
      btn.innerHTML = `<span class="choice-letter">${LETTERS[i]}</span>${choice}`;
      btn.onclick = () => handleAnswer(btn, choice, correctAnswer, onReveal);
      container.appendChild(btn);
    });
  }

  // ── Handle answer ──────────────────────────────────────────────────────────
  function handleAnswer(clickedBtn, chosen, correctAnswer, onReveal) {
    if (answered) return;
    answered = true;

    if (onReveal) onReveal();

    document.querySelectorAll(".choice-btn").forEach(btn => {
      btn.disabled = true;
      const text = btn.querySelector(".choice-letter").nextSibling.textContent.trim();
      if (text === correctAnswer && btn !== clickedBtn) btn.classList.add("correct");
    });

    const msg = document.getElementById("result-msg");
    if (chosen === correctAnswer) {
      clickedBtn.classList.add("correct");
      correct++;
      document.getElementById("sc-correct").textContent = correct;
      msg.textContent = "✓ Correct!";
      msg.className = "result-msg show-correct";
    } else {
      clickedBtn.classList.add("wrong");
      wrong++;
      document.getElementById("sc-wrong").textContent = wrong;
      msg.textContent = `✗ Answer: ${correctAnswer}`;
      msg.className = "result-msg show-wrong";
    }

    document.getElementById("next-btn").className = "next-btn" +
      (deck[current].type === "reading" ? " wide" : "") + " visible";
  }

  function nextCard() {
    current++;
    if (current >= deck.length) showSummary();
    else renderCard();
  }

  function showSummary() {
    document.getElementById("game-area").style.display = "none";
    document.getElementById("prog-fill").style.width = "100%";
    document.getElementById("prog-label").textContent = `${deck.length} / ${deck.length}`;
    const total = correct + wrong;
    const pct = total > 0 ? Math.round((correct / total) * 100) : 0;
    document.getElementById("pct").textContent = pct + "%";
    document.getElementById("sum-correct").textContent = correct;
    document.getElementById("sum-wrong").textContent = wrong;
    document.getElementById("summary").className = "summary show";
  }

  function restart() {
    correct = 0; wrong = 0;
    seenAnswers.clear();
    document.getElementById("sc-correct").textContent = 0;
    document.getElementById("sc-wrong").textContent = 0;
    document.getElementById("summary").className = "summary";
    document.getElementById("game-area").style.display = "flex";
    init();
  }

  function init() {
    deck = buildDeck();
    current = 0;
    seenAnswers.clear();
    renderCard();
  }

  init();
</script>
</body>
</html>
